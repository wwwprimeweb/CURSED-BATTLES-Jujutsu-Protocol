<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cursed Battles</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>

    <div id="menu-bg"></div>

    <main id="app">
      <canvas id="game-canvas" width="1280" height="720"></canvas>

      <section id="start-screen" class="visible">
        <div class="menu-shell">
          <div class="menu-top">
            <div class="logo-section">
              <h1 class="logo-title">CURSED BATTLES</h1>
              <p class="logo-sub">Jujutsu Protocol</p>
            </div>

            <div class="join-section">
              <label for="nick-input">IDENTIFICA&Ccedil;&Atilde;O</label>
              <input id="nick-input" maxlength="20" placeholder="Digite seu nick" autocomplete="off" />
              <button id="play-btn" type="button">
                <span class="btn-text">▶ ENTRAR</span>
              </button>
            </div>
          </div>

          <div class="menu-bottom">
            <h2 class="section-title">SELE&Ccedil;&Atilde;O DE PERSONAGENS</h2>
            <div class="character-grid">
              <button class="character-card selected" data-character="gojo" aria-pressed="true" style="--char-bg:url(/assets/domains/gojo1.png);--i:0">
                <div class="char-icon" data-src="/assets/gojo-icon.png"></div>
                <span class="char-name">Satoru Gojo</span>
              </button>

              <button class="character-card" data-character="sukuna" aria-pressed="false" style="--char-bg:url(/assets/domains/sukuna-domain.png);--i:1">
                <div class="char-icon" data-src="/assets/sukuna-icon.png"></div>
                <span class="char-name">Ryomen Sukuna</span>
              </button>

              <button class="character-card" data-character="yuta" aria-pressed="false" style="--char-bg:url(/assets/domains/yuta1.png);--i:2">
                <div class="char-icon" data-src="/assets/yuta-icon.png"></div>
                <span class="char-name">Yuta Okkotsu</span>
              </button>

              <button class="character-card" data-character="yuji" aria-pressed="false" style="--char-bg:url(/assets/domains/yuji-domain.png);--i:3">
                <div class="char-icon" data-src="/assets/yuji-icon.png"></div>
                <span class="char-name">Yuji Itadori</span>
              </button>

              <button class="character-card" data-character="megumi" aria-pressed="false" style="--char-bg:url(/assets/domains/megumi-domain.png);--i:4">
                <div class="char-icon" data-src="/assets/megumi-icon.png"></div>
                <span class="char-name">Megumi Fushiguro</span>
              </button>

              <button class="character-card" data-character="hakari" aria-pressed="false" style="--char-bg:url(/assets/domains/hakari-domain.png);--i:5">
                <div class="char-icon" data-src="/assets/hakari-icon.png"></div>
                <span class="char-name">Kinji Hakari</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="hud-layer">
        <div id="match-timer"></div>
        <div id="center-alerts"></div>
        <div id="boss-bar" class="hidden"></div>
        <div id="hud-main">
          <div id="bars"></div>
        </div>
        <div id="skill-dock">
          <div id="quick-access"></div>
          <div id="main-skills"></div>
        </div>
        <div id="buffs-debuffs"></div>
        <div id="minimap"></div>
        <div id="top-right"></div>
        <div id="upgrade-overlay" class="hidden"></div>
        <div id="gameover-overlay" class="hidden">
          <h2 class="go-title">DERROTADO</h2>
          <p class="go-sub">Reiniciando partida...</p>
        </div>
        <div id="spectate-overlay" class="hidden">
          <span id="spectate-text">Spectating...</span>
          <span class="spectate-hint">[ ] para trocar</span>
        </div>
      </section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
